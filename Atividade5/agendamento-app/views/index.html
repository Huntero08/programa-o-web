<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendamento de Consulta</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background-color: #f9f9f9; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: white; padding: 20px; border: 1px solid #000; }
        h1 { text-align: center; }
        fieldset { border: none; margin-bottom: 20px; padding: 0; }
        legend { font-size: 1.4rem; margin-bottom: 10px; border-bottom: 1px solid #000; width: 100%; }
        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        input, select, textarea { padding: 8px; border: 1px solid #000; font-family: inherit; }
        select { background-color: #ddd; }
        button { width: 100%; padding: 12px; background-color: #ccc; border: 1px solid #000; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agendamento</h1>
        <form action="/agendamento" method="POST">
            <fieldset>
                <legend>Dados do paciente</legend>
                <div class="row">
                    <div class="input-group"><label>Nome</label><input type="text" name="nome"></div>
                    <div class="input-group"><label>Sobrenome</label><input type="text" name="sobrenome"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>CPF</label><input type="text" name="cpf"></div>
                    <div class="input-group"><label>Data de nascimento</label><input type="date" name="nascimento"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Telefone</label><input type="text" name="telefone"></div>
                    <div class="input-group"><label>CEP</label><input type="text" name="cep"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Endereço</label><input type="text" name="endereco"></div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados do consulta</legend>
                <div class="row">
                    <div class="input-group">
                        <label>Clínica</label>
                        <select name="clinica">
                            <option value="">Selecione...</option>
                            <option value="Clínica Central">Clínica Central</option>
                            <option value="Clínica Norte">Clínica Norte</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Especialidade</label><input type="text" name="especialidade"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Data</label><input type="date" name="data"></div>
                    <div class="input-group"><label>Hora</label><input type="time" name="hora"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Observação</label><textarea name="observacao" rows="3"></textarea></div>
                </div>
            </fieldset>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
